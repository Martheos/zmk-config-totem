name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Build seeeduino_xiao_ble dongle
        run: >
          west build -s zmk/app -b seeeduino_xiao_ble
          --build-dir build/seeeduino_xiao_ble_totem_dongle
          -- -DSHIELD="totem_dongle dongle_display"
          -DCONFIG_ZMK_STUDIO=y
          -DZMK_SNIPPET="studio-rpc-usb-uart"

      - name: Build seeeduino_xiao_ble left
        run: >
          west build -s zmk/app -b seeeduino_xiao_ble
          --build-dir build/seeeduino_xiao_ble_totem_left
          -- -DSHIELD="totem_left"

      - name: Build seeeduino_xiao_ble right
        run: >
          west build -s zmk/app -b seeeduino_xiao_ble
          --build-dir build/seeeduino_xiao_ble_totem_right
          -- -DSHIELD="totem_right"

      - name: Collect firmware
        run: |
          mkdir -p artifacts
          echo "=== Build directories ==="
          ls -la build/
          for dir in build/*/; do
            name=$(basename "$dir")
            echo "Checking $dir ..."
            if [ -f "$dir/zephyr/zmk.uf2" ]; then
              cp "$dir/zephyr/zmk.uf2" "artifacts/${name}.uf2"
              echo "  Copied ${name}.uf2"
            else
              echo "  No zmk.uf2 found in zephyr/"
            fi
            if [ -f "$dir/zephyr/zmk.hex" ]; then
              cp "$dir/zephyr/zmk.hex" "artifacts/${name}.hex"
              echo "  Copied ${name}.hex"
            fi
          done
          echo "=== Firmware files ==="
          ls -la artifacts/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: artifacts/
          retention-days: 14
